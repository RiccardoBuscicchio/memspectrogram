name: Tests

on:
  push:
  pull_request:

jobs:
  run-tests:
    name: Run test suite (Julia ${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        julia-version: ["1.10.11", "1"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia ${{ matrix.julia-version }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project=. test/runtests.jl

  gpu-extension-tests:
    name: GPU extension tests (Julia 1, CPU fallback)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Add CUDA to test environment
        run: julia --project=. -e 'using Pkg; Pkg.add("CUDA")'

      - name: Run GPU extension tests
        run: julia --project=. test/gpu_tests.jl
