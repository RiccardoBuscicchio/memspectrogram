name: PSD Plot

on:
  push:
  pull_request:

jobs:
  generate-psd-plot:
    name: Generate toy PSD estimate plot
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run toy PSD estimate script
        run: julia --project=. examples/toy_psd_estimate.jl

      - name: Upload PSD plot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: toy-psd-estimate
          path: examples/toy_psd_estimate.png
          if-no-files-found: error

  generate-spectrogram:
    name: Generate MESA spectrogram
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run toy spectrogram script
        run: julia --project=. examples/toy_spectrogram.jl

      - name: Upload spectrogram as artifact
        uses: actions/upload-artifact@v4
        with:
          name: toy-spectrogram
          path: examples/toy_spectrogram.png
          if-no-files-found: error

  generate-chirp-spectrogram:
    name: Generate chirp signal spectrogram
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run chirp spectrogram script
        run: julia --project=. examples/chirp_spectrogram.jl

      - name: Upload chirp spectrogram as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-spectrogram
          path: examples/chirp_spectrogram.png
          if-no-files-found: error

  timing-benchmark:
    name: Multi-thread timing benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run benchmark with 1 thread
        run: julia -t 1 --project=. examples/timing_benchmark.jl | tee -a timing_results.txt

      - name: Run benchmark with 2 threads
        run: julia -t 2 --project=. examples/timing_benchmark.jl | tee -a timing_results.txt

      - name: Upload timing results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: timing-results
          path: timing_results.txt
          if-no-files-found: error

