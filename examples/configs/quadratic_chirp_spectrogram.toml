# Configuration for examples/quadratic_chirp_spectrogram.jl
#
# Usage:
#   julia examples/quadratic_chirp_spectrogram.jl --config examples/configs/quadratic_chirp_spectrogram.toml

n_total = 32768    # total number of samples (default: 16 × 2048)

fs      = 512.0    # sampling rate (Hz)
sigma   = 0.25     # additive noise amplitude
seed    = 42
f_start = 5.0      # chirp start frequency (Hz)
f_end   = 200.0    # chirp end frequency (Hz)
seg_len = 512      # samples per spectrogram segment
overlap = 0.875    # fractional overlap (0–1)
n_reps  = 5        # number of timing repetitions
optimisation_method = "FPE"
method  = "Fast"
