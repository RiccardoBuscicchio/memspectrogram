# Configuration for examples/gw170817_spectrogram.jl
#
# GW170817: first binary neutron star (BNS) merger, detected 2017-08-17.
# Uses 32 s of GWOSC H1 strain around GW170817 (GPS 1187008867–1187008899).
#
# Usage:
#   julia --project=. examples/gw170817_spectrogram.jl \
#       --config examples/configs/gw170817_spectrogram.toml

# Data source (GWOSC open data portal)
h1_url = "https://gwosc.org/eventapi/html/GWTC-1-confident/GW170817/v3/H-H1_GWOSC_4KHZ_R1-1187008867-32.hdf5"

# Bandpass filter — wider upper bound than GW150914 to capture the BNS chirp
bp_low   = 20.0    # lower cut-off (Hz)
bp_high  = 1000.0  # upper cut-off (Hz)
bp_order = 4       # Butterworth order

# Memgram parameters
seg_len = 512      # samples per segment  (≈ 0.125 s at 4096 Hz)
overlap = 0.95     # fractional segment overlap

# Display window (seconds either side of GW170817 merger)
t_window = 2.0

# Display frequency range
f_min = 20.0       # Hz
f_max = 1000.0     # Hz

# AR model settings
optimisation_method = "FPE"
method = "Standard"
